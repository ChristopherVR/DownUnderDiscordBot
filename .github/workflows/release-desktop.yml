name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            name: windows-latest
            args: ''
          - platform: ubuntu-22.04
            name: ubuntu-22.04
            args: ''
          # Split from a single universal-apple-darwin build: the bundled
          # bot sidecar's native addons (better-sqlite3, mediaplex) and the
          # sidecar Node binary itself aren't lipo'd by Tauri the way the
          # main Rust binary is, so each Mac arch needs its own fully-native
          # build (and its own DMG) rather than one universal one.
          #
          # Both jobs run on genuinely native hardware for their arch -
          # macos-latest is Apple Silicon (arm64) by default, and
          # macos-15-intel is GitHub's real x86_64 runner (macos-13 was the
          # prior Intel image; it was fully retired Dec 2025 - see
          # actions/runner-images#13045). This matters beyond just avoiding
          # `--target` cross-compilation for the Rust shell: `npm install`
          # inside build-sidecar.mjs fetches native addon prebuilds (and
          # `rustc --print host-tuple` names the sidecar binary) based on
          # the ACTUAL host running the job, not the --target flag, so
          # cross-compiling this job on an arm64 runner would silently ship
          # arm64 native addons mislabeled as x86_64.
          - platform: macos-latest
            name: macos-aarch64
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-15-intel
            name: macos-x86_64
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target || '' }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri -> target

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter discord-dashboard-shared build

      - name: Build bot sidecar resources
        run: pnpm --filter discord-bot run build:sidecar

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: packages/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Down Under Bot Desktop ${{ github.ref_name }}'
          releaseBody: 'See the release notes for details.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
