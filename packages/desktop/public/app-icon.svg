<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Beamed eighth notes (white) - the beam curves like a boomerang -->
  <g fill="white">
    <!-- Left note head -->
    <ellipse cx="160" cy="350" rx="48" ry="35" transform="rotate(-15 160 350)"/>
    <!-- Right note head -->
    <ellipse cx="295" cy="320" rx="48" ry="35" transform="rotate(-15 295 320)"/>
    <!-- Left stem -->
    <rect x="200" y="115" width="18" height="245" rx="9"/>
    <!-- Right stem -->
    <rect x="335" y="80" width="18" height="250" rx="9"/>
    <!-- Boomerang-curved beam -->
    <path d="M200 120 C230 70 320 55 353 85 L353 110 C320 85 235 95 205 140 Z"/>
  </g>

  <!-- Sound wave arcs (broadcasting / bot) -->
  <path d="M375 175 Q410 245 375 315" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M408 145 Q455 245 408 345" stroke="white" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Southern Cross stars (Australian touch) -->
  <circle cx="105" cy="105" r="10" fill="white" opacity="0.7"/>
  <circle cx="130" cy="145" r="7" fill="white" opacity="0.5"/>
  <circle cx="85" cy="150" r="7" fill="white" opacity="0.5"/>
  <circle cx="108" cy="180" r="6" fill="white" opacity="0.4"/>
  <circle cx="75" cy="115" r="5" fill="white" opacity="0.35"/>
</svg>
